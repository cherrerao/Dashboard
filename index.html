<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISPOALM · Dashboard Almacenes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Pantalla de upload eliminada -->

<!-- ══════════════════ APP ════════════════════════════════════ -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-brand">DISPOALM</span>
    <div class="topbar-sep"></div>
    <span class="topbar-meta" id="tb-meta">—</span>
    <div class="topbar-right">
      <div class="pill-live"><div class="live-dot"></div>CONECTADO</div>
      <button class="btn-sm" onclick="goBack()">✕ Desconectar</button>
    </div>
  </div>

  <!-- FILE TABS -->
  <div class="file-nav" id="file-nav">
    <button class="nav-refresh" id="refresh-btn" onclick="refreshFiles()" title="Actualizar archivos desde Drive">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0018.49 15"/></svg>
      Actualizar
    </button>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div id="dash-content">
    <div class="loading-overlay">
      <div class="loader"></div>
      <div class="loading-text">Cargando archivos desde Drive…</div>
    </div>
  </div>

  <div class="footer" id="footer-txt"></div>
</div>

<script src="dispo_detalle.js"></script>
<script src="dispo_centros.js"></script>
<script src="script.js"></script>
</body>
</html>
